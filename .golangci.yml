version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - gosec
    - goconst
    - gocyclo
    - misspell
    - nolintlint
  settings:
    gocyclo:
      min-complexity: 30
    goconst:
      min-occurrences: 5
      min-len: 5
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - syscall.Close
        - os.Remove
    gosec:
      excludes:
        - G115 # Integer overflow conversions (FUSE interface requires uint64/uint32↔int64 casts)
        - G204 # Subprocess launched with variable (expected for Docker CLI)
        - G304 # File path provided as taint input (expected for file operations)
        - G306 # WriteFile permissions >0600 (build context files need 0644/0755, test files use t.TempDir)
  exclusions:
    paths:
      - native
      - embedded

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
