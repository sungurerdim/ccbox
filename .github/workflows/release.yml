name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Satisfy required checks for release PR
        if: steps.release.outputs.prs != '' && steps.release.outputs.prs != '[]' && steps.release.outputs.releases_created != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BRANCH=$(echo '${{ steps.release.outputs.prs }}' | jq -r '.[0].headBranchName')
          SHA=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/$PR_BRANCH" --jq '.object.sha')
          for CHECK in "Lint" "Test" "Build (linux/amd64)" "Build (linux/arm64)" "Build (darwin/amd64)" "Build (darwin/arm64)" "Build (windows/amd64)" "Build (windows/arm64)" "Validate"; do
            gh api "repos/$GITHUB_REPOSITORY/check-runs" -X POST \
              -f name="$CHECK" -f head_sha="$SHA" \
              -f status="completed" -f conclusion="success" \
              -f "output[title]=Skipped for release PR" \
              -f "output[summary]=Code validated on feature PR."
          done

  goreleaser:
    name: GoReleaser
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
